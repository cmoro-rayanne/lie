<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows & elevation" subtitle="Soft, warm-tinted — never harsh black" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 34px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 28px; }
  .item { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .box { width: 130px; height: 78px; background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--border-soft); }
  .lbl { font-size: 0.62rem; color: var(--text-muted); text-align: center; }
  .lbl b { display: block; color: var(--text-strong); font-size: 0.7rem; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-soft)"></div><span class="lbl"><b>shadow-soft</b>resting stat rows</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="lbl"><b>shadow-card</b>card hover lift</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-cta); background:var(--grad-cta)"></div><span class="lbl"><b>shadow-cta</b>primary button hover</span></div>
</div>
</body></html>
