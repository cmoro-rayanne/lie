<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .meta { font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  p { font-family: var(--font-sans); margin: 0 0 12px; }
  .lead { font-size: 1.05rem; font-weight: 400; color: var(--text-muted); }
  .body { font-size: 1rem; font-weight: 300; line-height: 1.9; color: var(--text-body); max-width: 600px; }
</style></head>
<body>
  <div class="meta">Inter · 300 / 400 / 500 / 600</div>
  <p class="lead">Olhar para a história com presença e acolhimento.</p>
  <p class="body">Sou psicóloga clínica e acompanho pessoas em processos de autoconhecimento, desenvolvimento emocional e transformação pessoal. Cada pessoa possui uma sabedoria interna capaz de orientar seu próprio caminho.</p>
</body></html>
