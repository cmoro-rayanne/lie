<!-- @dsCard group="Brand" viewport="700x150" name="Decorative glyphs" subtitle="Serif geometric marks used as section/card icons" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 28px; align-items: center; }
  .g { font-family: var(--font-serif); font-size: 2.4rem; color: var(--color-terra-400); line-height: 1; }
  .note { max-width: 230px; font-size: 0.72rem; line-height: 1.7; color: var(--text-muted); }
  .note b { color: var(--text-strong); }
</style></head>
<body>
<div class="row">
  <span class="g">◎</span><span class="g">◈</span><span class="g">◇</span>
  <span class="g">◉</span><span class="g">◐</span><span class="g">◑</span>
  <p class="note"><b>Geometric serif glyphs</b> stand in for icons on cards and specialties — quiet, abstract, never literal. Rendered in terra-400.</p>
</div>
</body></html>
