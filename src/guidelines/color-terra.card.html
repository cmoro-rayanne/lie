<!-- @dsCard group="Colors" viewport="700x150" name="Terracotta — primary accent" subtitle="CTAs, links, emphasis, focus" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.04em; }
  .h { font-size: 0.58rem; opacity: 0.75; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-terra-100); color:var(--color-terra-600)"><span class="n">terra-100</span><span class="h">#f2ebe3</span></div>
  <div class="sw" style="background:var(--color-terra-200); color:var(--color-terra-600)"><span class="n">terra-200</span><span class="h">#d9c5b0</span></div>
  <div class="sw" style="background:var(--color-terra-300); color:var(--color-warm-800)"><span class="n">terra-300</span><span class="h">#c4a882</span></div>
  <div class="sw" style="background:var(--color-terra-400); color:#fff"><span class="n">terra-400</span><span class="h">#b08d65</span></div>
  <div class="sw" style="background:var(--color-terra-500); color:#fff"><span class="n">terra-500 ●</span><span class="h">#9a7350</span></div>
  <div class="sw" style="background:var(--color-terra-600); color:#fff"><span class="n">terra-600</span><span class="h">#7c5b3c</span></div>
</div>
</body></html>
