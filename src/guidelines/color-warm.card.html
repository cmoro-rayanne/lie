<!-- @dsCard group="Colors" viewport="700x150" name="Warm — ink & dark surfaces" subtitle="Body text, headings, dark hero/footer grounds" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; color: #fff; }
  .n { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.04em; }
  .h { font-size: 0.58rem; opacity: 0.75; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-warm-900)"><span class="n">warm-900</span><span class="h">#1e1a17</span></div>
  <div class="sw" style="background:var(--color-warm-800)"><span class="n">warm-800 ●</span><span class="h">#2d2824</span></div>
  <div class="sw" style="background:var(--color-warm-700)"><span class="n">warm-700</span><span class="h">#3d3630</span></div>
  <div class="sw" style="background:var(--color-warm-600)"><span class="n">warm-600</span><span class="h">#5a5048</span></div>
  <div class="sw" style="background:var(--grad-hero); border-left:1px solid rgba(255,255,255,0.1)"><span class="n">grad-hero</span><span class="h">dark sections</span></div>
</div>
</body></html>
