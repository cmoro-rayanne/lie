<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .meta { font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .d { font-family: var(--font-serif); color: var(--text-strong); line-height: 1.12; letter-spacing: -0.01em; font-weight: 300; }
</style></head>
<body>
  <div class="meta">Cormorant Garamond · 300 / 400 · italic</div>
  <div class="d" style="font-size: 3.4rem;">Uma escuta para a <em style="color:var(--accent); font-style:italic;">sua totalidade</em></div>
  <div class="d" style="font-size: 1.5rem; font-weight: 400; margin-top: 10px;">Através da experiência, podemos nos aproximar de quem verdadeiramente somos.</div>
</body></html>
