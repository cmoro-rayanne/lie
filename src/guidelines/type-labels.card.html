<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-family: var(--font-sans); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); }
  .pretitle { font-family: var(--font-sans); font-size: 0.68rem; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; color: var(--color-terra-500); }
  .nav { font-family: var(--font-sans); font-size: 0.78rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-body); }
  .meta { font-family: var(--font-sans); font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
</style></head>
<body>
  <div><div class="meta">eyebrow · 0.28em</div><div class="eyebrow">Áreas de Atuação</div></div>
  <div><div class="meta">hero pre-title · 0.32em</div><div class="pretitle">Psicologia Clínica · Autoconhecimento · Transformação</div></div>
  <div><div class="meta">nav link · 0.12em</div><div class="nav">Sobre&nbsp;&nbsp;&nbsp;Abordagem&nbsp;&nbsp;&nbsp;Atuação&nbsp;&nbsp;&nbsp;Contato</div></div>
</body></html>
