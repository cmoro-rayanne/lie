<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base step — airy, generous rhythm" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .bar { background: var(--color-terra-300); height: 28px; border-radius: 2px; }
  .lbl { font-size: 0.6rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .lbl b { color: var(--text-strong); display: block; font-size: 0.68rem; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="width:var(--space-2)"></div><span class="lbl"><b>2</b>8px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-3)"></div><span class="lbl"><b>3</b>12px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-4)"></div><span class="lbl"><b>4</b>16px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-6)"></div><span class="lbl"><b>6</b>24px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-8)"></div><span class="lbl"><b>8</b>32px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-12)"></div><span class="lbl"><b>12</b>48px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-16)"></div><span class="lbl"><b>16</b>64px</span></div>
  <div class="item"><div class="bar" style="width:var(--space-20)"></div><span class="lbl"><b>20</b>80px</span></div>
</div>
</body></html>
