<!-- @dsCard group="Colors" viewport="700x150" name="Sand — warm neutrals" subtitle="Surfaces, backgrounds, hairline borders" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.04em; }
  .h { font-size: 0.58rem; opacity: 0.7; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-sand-50); color:var(--color-warm-700)"><span class="n">sand-50</span><span class="h">#faf8f4</span></div>
  <div class="sw" style="background:var(--color-sand-100); color:var(--color-warm-700)"><span class="n">sand-100</span><span class="h">#f3ede3</span></div>
  <div class="sw" style="background:var(--color-sand-200); color:var(--color-warm-700)"><span class="n">sand-200</span><span class="h">#e8ddd0</span></div>
  <div class="sw" style="background:var(--color-sand-300); color:var(--color-warm-800)"><span class="n">sand-300</span><span class="h">#d5c5b2</span></div>
  <div class="sw" style="background:var(--color-sand-400); color:#fff"><span class="n">sand-400</span><span class="h">#c0a98e</span></div>
  <div class="sw" style="background:var(--color-sand-500); color:#fff"><span class="n">sand-500</span><span class="h">#a68c6d</span></div>
</div>
</body></html>
