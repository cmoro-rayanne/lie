<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="sm → 2xl · cards use lg, buttons & inputs use sm" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--color-sand-100); border: 1px solid var(--border-accent); }
  .lbl { font-size: 0.62rem; color: var(--text-muted); text-align: center; }
  .lbl b { display: block; color: var(--text-strong); font-size: 0.7rem; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl"><b>sm</b>4px · buttons</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl"><b>md</b>8px · stats</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl"><b>lg</b>16px · cards</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl"><b>xl</b>24px</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill); width:120px"></div><span class="lbl"><b>pill</b>999px · tags</span></div>
</div>
</body></html>
