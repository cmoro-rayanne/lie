<!-- @dsCard group="Colors" viewport="700x150" name="Olive — secondary / grounding" subtitle="Tags, the 'go' CTA banner, balance" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.04em; }
  .h { font-size: 0.58rem; opacity: 0.75; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--color-olive-100); color:var(--color-olive-600)"><span class="n">olive-100</span><span class="h">#eff0ea</span></div>
  <div class="sw" style="background:var(--color-olive-200); color:var(--color-olive-600)"><span class="n">olive-200</span><span class="h">#d4d8c8</span></div>
  <div class="sw" style="background:var(--color-olive-300); color:var(--color-warm-800)"><span class="n">olive-300</span><span class="h">#b5bda0</span></div>
  <div class="sw" style="background:var(--color-olive-400); color:#fff"><span class="n">olive-400</span><span class="h">#909e78</span></div>
  <div class="sw" style="background:var(--color-olive-500); color:#fff"><span class="n">olive-500 ●</span><span class="h">#6e7d58</span></div>
  <div class="sw" style="background:var(--color-olive-600); color:#fff"><span class="n">olive-600</span><span class="h">#546042</span></div>
</div>
</body></html>
