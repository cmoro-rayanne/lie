<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1.2fr 1fr; }
  .cell { display: flex; align-items: center; justify-content: center; padding: 36px; min-height: 200px; }
  .light { background: var(--bg-page); }
  .warm { background: var(--bg-warm); }
  .dark { background: var(--grad-quote); }
  .ink { background: var(--grad-hero); }
  .strip { grid-column: 1 / -1; display: flex; gap: 40px; align-items: center; justify-content: center; padding: 28px; background: var(--color-sand-100); }
  .cap { position: absolute; font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin: -14px 0 0; align-self: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Logo } = window.ElianaLinoDesignSystem_6994f2;
  function Demo() {
    return (
      <div className="grid">
        <div className="cell light"><Logo variant="full" size={130} /></div>
        <div className="cell dark"><Logo variant="full" tone="dark" size={120} /></div>
        <div className="strip">
          <Logo variant="inline" size={46} />
          <Logo variant="mark" size={64} />
          <Logo variant="wordmark" size={64} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>
