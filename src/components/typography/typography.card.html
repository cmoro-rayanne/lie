<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); }
  .light { padding: 32px; }
  .dark { padding: 32px; background: var(--grad-quote); }
  .em { color: var(--accent); font-style: italic; }
  .dark .em { color: var(--color-gold); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { SectionHeading, Divider } = window.ElianaLinoDesignSystem_6994f2;
  function Demo() {
    return (
      <div>
        <div className="light">
          <SectionHeading eyebrow="Sobre mim">
            Uma escuta para a <em className="em">sua totalidade</em>
          </SectionHeading>
          <Divider style={{ marginTop: 24 }} />
        </div>
        <div className="dark">
          <SectionHeading tone="dark" align="center" eyebrow="Abordagem Terapêutica"
            lead="Mente, corpo, emoções e espiritualidade caminham juntos.">
            O Caminho de <em className="em">Integração</em>
          </SectionHeading>
          <Divider tone="dark" variant="center" style={{ marginTop: 24 }} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
