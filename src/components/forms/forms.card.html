<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 560px; }
  .full { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input } = window.ElianaLinoDesignSystem_6994f2;
  function Demo() {
    return (
      <div className="grid">
        <Input placeholder="Seu nome completo" defaultValue="Mariana Souza" />
        <Input type="email" placeholder="Seu e-mail" />
        <div className="full">
          <Input as="select" defaultValue="" options={[
            { value: '', label: 'Assunto — por onde começar?' },
            { value: 'ansiedade', label: 'Ansiedade ou estresse' },
            { value: 'autoconhecimento', label: 'Autoconhecimento' },
          ]} />
        </div>
        <div className="full">
          <Input as="textarea" rows={3} placeholder="Conte um pouco sobre o que você está buscando…" />
        </div>
        <Input label="WhatsApp" placeholder="(11) 99999-9999" />
        <Input label="E-mail" error="E-mail inválido" defaultValue="mariana@" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
