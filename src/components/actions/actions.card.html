<!-- @dsCard group="Components" viewport="700x300" name="Actions — Button & IconButton" subtitle="Primary, outline & ghost CTAs; round icon controls" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); }
  .row { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
  .dark { background: var(--grad-quote); border-radius: var(--radius-lg); padding: 24px; }
  .lbl { font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); width: 100%; margin-bottom: 2px; }
  .dark .lbl { color: var(--color-gold-soft); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.ElianaLinoDesignSystem_6994f2;
  const Chevron = ({ d }) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points={d} /></svg>
  );
  const Chat = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  );
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">On light · primary / secondary / ghost · sizes</span>
          <Button variant="primary" size="lg">Agendar Consulta</Button>
          <Button variant="secondary" tone="light">Conheça meu trabalho</Button>
          <Button variant="ghost">Saiba mais</Button>
          <Button variant="primary" size="sm" icon={<Chat />}>WhatsApp</Button>
          <Button variant="primary" disabled>Enviando…</Button>
        </div>
        <div className="row dark">
          <span className="lbl">On dark (hero / footer) · tone="dark"</span>
          <Button variant="primary" size="lg">Conheça meu trabalho</Button>
          <Button variant="secondary" tone="dark">Agendar Consulta</Button>
          <IconButton tone="dark" aria-label="anterior"><Chevron d="15 18 9 12 15 6" /></IconButton>
          <IconButton tone="dark" aria-label="próximo"><Chevron d="9 18 15 12 9 6" /></IconButton>
        </div>
        <div className="row">
          <span className="lbl">IconButton · outline (nav) · soft (social)</span>
          <IconButton aria-label="anterior"><Chevron d="15 18 9 12 15 6" /></IconButton>
          <IconButton aria-label="próximo"><Chevron d="9 18 15 12 9 6" /></IconButton>
          <IconButton variant="soft" aria-label="instagram"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></IconButton>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
